<title>ULTRAPAY</title>
<style>

  body {

    color: #fff;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: #000;
    padding: 14px 0;
    text-align: center;
    border-bottom: 1px solid #1a1a2e;
  }
  .logo {
    display: inline-flex; align-items: center; gap: 10px;
    text-decoration: none; color: #fff;
  }
  .logo-icon {
    width: 38px; height: 38px;
    background: #fff; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .logo-icon svg { width: 26px; height: 26px; }
  .logo-text { line-height: 1.1; }
  .logo-text .ultra { font-size: 13px; font-weight: 800; letter-spacing: 2px; }
  .logo-text .pay { font-size: 10px; letter-spacing: 3px; color: #aaa; }

  /* ── BACKGROUNDS ── */
  #page-home {
    min-height: 100vh;
    background:
      radial-gradient(ellipse 55% 60% at 10% 50%, #0d3a5c 0%, transparent 60%),
      radial-gradient(ellipse 55% 70% at 90% 50%, #3b1060 0%, transparent 60%),
      #0a0a14;
  }
  #page-detail {
    min-height: 100vh;
    background:
      radial-gradient(ellipse 45% 60% at 5% 40%, #0d3a5c 0%, transparent 55%),
      radial-gradient(ellipse 45% 70% at 95% 50%, #3b1060 0%, transparent 55%),
      #0a0a14;
    display: none;
  }

  /* ── HOME PAGE ── */
  .home-content {
    max-width: 960px; margin: 0 auto;
    padding: 64px 24px 80px;
    text-align: center;
  }
  .home-content h1 {
    font-size: 38px; font-weight: 700;
    margin-bottom: 12px; letter-spacing: -0.5px;
  }
  .home-content p {
    font-size: 15px; color: #888; margin-bottom: 36px;
  }

  .search-wrap {
    max-width: 520px; margin: 0 auto 52px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 999px;
    padding: 14px 20px 14px 46px;
    color: #fff; font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input::placeholder { color: #555; }
  .search-wrap input:focus { border-color: rgba(255,255,255,0.3); }
  .search-icon {
    position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
    color: #555; font-size: 16px;
  }

  .region-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.15em;
    color: #555; text-transform: uppercase;
    margin-bottom: 24px;
  }

  .country-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px 24px;
    text-align: left;
  }

  .country-item {
    display: flex; align-items: center; gap: 14px;
    cursor: pointer;
    padding: 4px 0;
    border-radius: 8px;
    transition: opacity 0.15s;
  }
  .country-item:hover { opacity: 0.75; }

  .flag-box {
    width: 48px; height: 34px; border-radius: 6px;
    overflow: hidden; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    background: rgba(255,255,255,0.05);
  }
  .country-name {
    font-size: 15px; font-weight: 500; color: #fff;
  }

  /* ── DETAIL PAGE ── */
  .detail-content {
    max-width: 800px; margin: 0 auto;
    padding: 32px 24px 80px;
  }

  .back-link {
    display: inline-block; color: #6b9fd4; font-size: 14px;
    text-decoration: none; margin-bottom: 28px;
    cursor: pointer;
  }
  .back-link:hover { text-decoration: underline; }

  .detail-hero {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 28px;
  }
  .detail-flag {
    width: 80px; height: 56px; border-radius: 8px;
    overflow: hidden; display: flex; align-items: center;
    justify-content: center; font-size: 52px;
    background: rgba(255,255,255,0.05);
    flex-shrink: 0;
  }
  .detail-hero-text .welcome {
    font-size: 12px; color: #888; letter-spacing: 0.05em;
    text-transform: uppercase; margin-bottom: 4px;
  }
  .detail-hero-text h2 {
    font-size: 30px; font-weight: 700; letter-spacing: -0.5px;
  }

  .info-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    overflow: hidden;
  }

  .gateway-block {
    padding: 24px 28px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 16px;

  .gateway-name { font-size: 22px; font-weight: 700; }
  .gateway-sub { font-size: 12px; color: #777; letter-spacing: 0.08em; margin-top: 2px; }

    background: #3b82f6; color: #fff;
    border: none; border-radius: 8px;
    padding: 9px 18px; font-size: 14px; font-weight: 500;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    text-decoration: none; display: inline-flex; align-items: center; gap: 6px;

  .demo-btn:hover { background: #2563eb; }

    padding: 18px 28px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .section-block:last-child { border-bottom: none; }

  .section-heading {
    font-size: 10.5px; font-weight: 600; letter-spacing: 0.14em;
    color: #666; text-transform: uppercase; margin-bottom: 14px;
  }

  .row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    gap: 16px;
  }
  .row:last-child { border-bottom: none; }

  .row-label {
    font-size: 14px; color: #ccc; flex-shrink: 0;
  }
  .row-label small { font-size: 12px; color: #666; }
  .row-value {
    font-size: 14px; color: #fff; text-align: right;
  }

  .prose-block {
    padding: 18px 28px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .prose-block:last-child { border-bottom: none; }
  .prose-entry { margin-bottom: 14px; }
  .prose-entry:last-child { margin-bottom: 0; }
  .prose-en { font-size: 14px; color: #ccc; line-height: 1.65; margin-bottom: 4px; }
  .prose-zh { font-size: 13px; color: #666; line-height: 1.6; }

  /* responsive */
  @media (max-width: 700px) {
    .country-grid { grid-template-columns: repeat(2, 1fr); }
    .home-content h1 { font-size: 26px; }
    .gateway-block { flex-direction: column; }
  }
  @media (max-width: 420px) {
    .country-grid { grid-template-columns: repeat(1, 1fr); }

  return {

    limits: { depositPer: `10 ${currency} - 1,000,000 ${currency}`, withdrawalPer: `10 ${currency} - 500,000 ${currency}` },

// RENDER HOME
// ══════════════════════════════════════════
function renderGrid(list) {
  const grid = document.getElementById('country-grid');
  grid.innerHTML = list.map(c => `
    <div class="country-item" onclick="showDetail('${c.code}')">
      <div class="flag-box"><img src="${c.flag}" alt="${c.name}" style="width:100%;height:100%;object-fit:cover;"></div>
      <div class="country-name">${c.name}</div>
    </div>
  `).join('');
}

renderGrid(countries);

function filterCountries(q) {
  const filtered = countries.filter(c => c.name.toLowerCase().includes(q.toLowerCase()));
  renderGrid(filtered);
}
